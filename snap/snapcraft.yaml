                - libqt5gui5-gles
                - libqt5quick5-gles
                - cameraplugin-aal
                - qtubuntu-media
                - gst-hybris
                - libqt5sensors5-sensorfw
                - lomiri-location-service-qt5-plugin
                - qtubuntu-android
                - mir1-client-platform-android5
                - mir1-client-platform-android-caf5
                - mir1-client-platform-android2-5
        - on amd64:
            - to amd64:
                - libqt5gui5
                - libqt5quick5

  misc:
    after: [ lomiri-platform, specifics ]
    source: misc
    plugin: dump

  cleanup:
    after:
      - lomiri-platform
      - specifics
      - misc
    plugin: nil
    build-packages: [ execstack ]
    build-snaps: [ mesa-2404 ]
    override-prime: |
      set -eux

      # mesa-2404 provided libraries
      cd /snap/mesa-2404/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR
      find . -type f,l -exec rm -rf $CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/{} \;
      rm -fr "$CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/dri"
      for CRUFT in bug drirc.d glvnd libdrm lintian man; do
        rm -rf "$CRAFT_PRIME/usr/share/$CRUFT"
      done
      rm -rf $CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/liburcu*

      # hybris-2404 provided libraries
      # We can't clean up against hybris-2404 as mainline also links against libhybris
      # right now. We can unify this once QtWebEngine runtime-loads libhybris instead.
      rm -f $CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/lib{EGL,GLESv1_CM,GLESv2}_libhybris.so*
      rm -f $CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libhybris/*.so

      # Probably a relict from our custom Mesa build
      rm -rf $CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libdrm_*.so*

      # Clear execstack to silence store complaints
      cd $CRAFT_PRIME/usr/lib
      find . -type f -name "*.so*" -exec execstack --clear-execstack {} \;

      # We want emojis & other bitmaps
      if [ -f "$CRAFT_PRIME/etc/fonts/conf.d/70-no-bitmaps-except-emoji.conf" ]; then
        rm -f "$CRAFT_PRIME/etc/fonts/conf.d/70-no-bitmaps-except-emoji.conf"
      fi

      # These have no effect in a Snap
      rm -f $CRAFT_PRIME/usr/bin/aa-*
      for CRUFT in X11 apparmor deviceinfo dbus-1 vulkan glvnd init.d sensorfw; do
        rm -rf "$CRAFT_PRIME/etc/${CRUFT}"
      done
      rm -rf "$CRAFT_PRIME/lib"

      # Usually found on an Ubuntu Touch host
      rm -rf "$CRAFT_PRIME/usr/share/{apparmor,click,dbus-1,doc}"
      rm -rf "$CRAFT_PRIME/usr/sbin"
      rm -rf "$CRAFT_PRIME/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/perl{5,-base}"
      rm -rf "$CRAFT_PRIME/usr/lib/{udev,systemd}"

      # Points to /run
      rm -f $CRAFT_PRIME/etc/pulse/client.conf.d/*-enable-autospawn.conf
