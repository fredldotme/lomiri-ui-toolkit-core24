name: lomiri-ui-toolkit-core24
version: "24.04-2.0"
summary: A convergent UI toolkit for all formfactors
description: |
  Lomiri UI Toolkit

  Lomiri UI Toolkit offers elements for graphical applications to make beautiful interfaces for your app.

  It is built on top of Qt5, Qt6 & QML and offers support for a wide variety of form factors.

  Your app can:

  - Run on smartphones, tablets, laptops & desktops
  - Use hardware acceleration by default
  - Quickly allow for functional apps with less effort

  Want to start magic? Use Lomiri UI Toolkit! 😊

  Lomiri by UBports is the continuation of the Unity8 efforts by Canonical Ltd.
compression: lzo
grade: stable
confinement: strict
base: core24

package-repositories:
  - type: apt
    url: http://repo.ubports.com/
    key-id: B551C909D750AA744948E9ED4BD4B4D6DBB583F1
    components: [ main ]
    suites: [ 24.04-2.x ]

lint:
  ignore:
    - library

platforms:
  amd64:
    build-on: amd64
  arm64:
    build-on: arm64
  armhf:
    build-on: armhf

slots:
  lomiri-ui-toolkit:
    content: lomiri-ui-toolkit
    interface: content
    read:
      - $SNAP

